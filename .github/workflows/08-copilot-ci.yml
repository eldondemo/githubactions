name: Demo 8 — Copilot CI

on:
  push:
    branches:
      - main
    paths:
      - "demos/demo8/**"
      - ".github/workflows/08-copilot-ci.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: demos/demo8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/cache@v4
        with:
          path: demos/demo8/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('demos/demo8/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm install
      - run: npm run lint
      - run: npm test
