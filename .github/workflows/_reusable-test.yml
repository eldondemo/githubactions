# Reusable workflow — called by other workflows via workflow_call
#
# Key concepts:
#   - on: workflow_call makes this a reusable workflow
#   - inputs let the caller pass configuration (e.g. node version)
#   - This is the "internal platform" pattern: define once, call many times

name: "_Reusable — Test (Node.js)"

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      working-directory:
        description: "Directory containing the Node.js app"
        required: false
        type: string
        default: "demos/demo3"
    # ── Outputs — pass data back to the caller ──────────────
    outputs:
      test-count:
        description: "Number of tests that ran"
        value: ${{ jobs.test.outputs.test-count }}
      cache-status:
        description: "Whether the cache was hit or missed"
        value: ${{ jobs.test.outputs.cache-status }}

jobs:
  test:
    name: "Test (Node ${{ inputs.node-version }})"
    runs-on: ubuntu-latest

    # ── Job outputs — fed into workflow outputs above ────────
    outputs:
      test-count: ${{ steps.test-results.outputs.test-count }}
      cache-status: ${{ steps.cache-npm.outputs.cache-hit == 'true' && 'HIT' || 'MISS' }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Cache node_modules based on package-lock.json hash ──
      - name: Cache npm dependencies
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working-directory }}/node_modules
          key: npm-${{ runner.os }}-node${{ inputs.node-version }}-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) }}
          restore-keys: |
            npm-${{ runner.os }}-node${{ inputs.node-version }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install

      - name: Show cache status
        run: |
          if [ "${{ steps.cache-npm.outputs.cache-hit }}" == "true" ]; then
            echo "⚡ Cache HIT — skipped npm install"
          else
            echo "❄️ Cache MISS — ran npm install"
          fi

      - name: Run tests
        id: test-results
        run: |
          # Run jest with JSON output to extract test count
          npx jest --verbose --json --outputFile=test-results.json 2>&1 || true
          if [ -f test-results.json ]; then
            TEST_COUNT=$(node -e "const r=require('./test-results.json'); console.log(r.numPassedTests + r.numFailedTests)")
          else
            TEST_COUNT="unknown"
          fi
          echo "test-count=${TEST_COUNT}" >> "$GITHUB_OUTPUT"
          echo "📊 Tests run: ${TEST_COUNT}"
          # Fail the step if any tests failed
          npx jest --verbose

      - name: Write summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 🧪 Test Results (Node ${{ inputs.node-version }})

          | Detail        | Value |
          |---------------|-------|
          | **Node**      | ${{ inputs.node-version }} |
          | **Cache**     | ${{ steps.cache-npm.outputs.cache-hit == 'true' && '⚡ HIT' || '❄️ MISS' }} |
          | **Directory** | \`${{ inputs.working-directory }}\` |

          > ✅ Tests passed
          EOF
