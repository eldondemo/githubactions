name: Demo 9 —Service Containers

on:
  push:
    branches:
      - main
    paths:
      - "demos/demo9/**"
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: demos/demo9

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: testdb

    steps:
      - uses: actions/checkout@v4

      - name: Seed database
        run: |
          psql <<'SQL'
            CREATE TABLE products (
              id SERIAL PRIMARY KEY,
              name TEXT NOT NULL,
              price NUMERIC(10,2) NOT NULL
            );
            INSERT INTO products (name, price) VALUES
              ('Widget',  9.99),
              ('Gadget', 24.95),
              ('Gizmo',  14.50);
          SQL

      - name: Query seeded rows
        run: |
          echo "## 🐘 Rows from Postgres sidecar" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          psql -c "SELECT * FROM products ORDER BY id;" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "--- Query result ---"
          psql -c "SELECT * FROM products ORDER BY id;"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm test
