# Demo 2 — Environments, Secrets, and GITHUB_TOKEN Permissions
#
# Key concepts:
#   - Environments (staging / production) with protection rules
#   - Repo-level vs environment-level secrets
#   - Workflow-level vs job-level permissions for GITHUB_TOKEN
#   - Least-privilege: start tight, add only what you need
#
# SETUP REQUIRED before running this workflow:
#   1. Go to Settings → Environments → create "staging" and "production"
#   2. On "production" add a "Required reviewers" protection rule
#   3. Go to Settings → Secrets and variables → Actions:
#      - Add a repo-level secret: REPO_API_KEY (any dummy value, e.g. "repo-secret-12345")
#   4. Go to Settings → Environments → staging → Add secret:
#      - Add an environment secret: ENV_API_KEY (e.g. "staging-secret-67890")
#   5. Do the same for production with a different value (e.g. "prod-secret-99999")

name: "Demo 2 — Environments, Secrets & Permissions"

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/02-*"

  workflow_dispatch:

# ── Workflow-level permissions (tight by default) ───────────
permissions:
  contents: read

# ── Jobs ────────────────────────────────────────────────────
jobs:

  # ── Job 1: Deploy to staging ──────────────────────────────
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use repo-level secret
        run: |
          # Secrets are masked — this will print *** if you try to echo them
          echo "Repo secret length: ${#REPO_API_KEY} characters"
          echo "✅ Repo-level secret is available in every job"
        env:
          REPO_API_KEY: ${{ secrets.REPO_API_KEY }}

      - name: Use environment secret
        run: |
          echo "Env secret length: ${#ENV_API_KEY} characters"
          echo "✅ Environment secret is scoped to the 'staging' environment"
        env:
          ENV_API_KEY: ${{ secrets.ENV_API_KEY }}

      - name: Simulate staging deployment
        run: |
          echo "🚀 Deploying to staging..."
          sleep 2
          echo "✅ Staging deployment complete!"

      - name: Write staging summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## 🟡 Staging Deployment

          | Detail          | Value |
          |-----------------|-------|
          | **Environment** | `staging` |
          | **Trigger**     | `${{ github.event_name }}` |
          | **Actor**       | `${{ github.actor }}` |
          | **Commit**      | `${{ github.sha }}` |

          > ✅ Staging deployment succeeded
          EOF

  # ── Job 2: Deploy to production (requires approval) ──────
  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use environment secret (production)
        run: |
          echo "Prod secret length: ${#ENV_API_KEY} characters"
          echo "✅ This secret is scoped to the 'production' environment only"
        env:
          ENV_API_KEY: ${{ secrets.ENV_API_KEY }}

      - name: Simulate production deployment
        run: |
          echo "🚀 Deploying to production..."
          sleep 2
          echo "✅ Production deployment complete!"

      - name: Write production summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## 🟢 Production Deployment

          | Detail          | Value |
          |-----------------|-------|
          | **Environment** | `production` |
          | **Trigger**     | `${{ github.event_name }}` |
          | **Actor**       | `${{ github.actor }}` |
          | **Commit**      | `${{ github.sha }}` |

          > ✅ Production deployment succeeded (after approval)
          EOF

  # ── Job 3: Demonstrate GITHUB_TOKEN permissions ───────────
  permission-demo:
    name: "GITHUB_TOKEN Permission Demo"
    runs-on: ubuntu-latest

    # "Small Upgrade" — job-level permission override
    # This job needs 'issues: write' to comment, even though
    # the workflow default is contents: read only.
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create an issue comment (requires issues:write)
        uses: actions/github-script@v7
        with:
          script: |
            // Find the most recent open issue (or skip if none exist)
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 1
            });

            if (issues.data.length === 0) {
              core.notice('No open issues found — skipping comment. Create an issue to see this in action!');
              return;
            }

            const issueNumber = issues.data[0].number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🤖 **Demo 2 — Permission check passed!**\n\nThis comment was posted by \`GITHUB_TOKEN\` with \`issues: write\` permission.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

            core.info(`✅ Comment posted on issue #${issueNumber}`);

      - name: Write permission demo summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## 🔐 GITHUB_TOKEN Permissions Demo

          - **Workflow-level default:** `contents: read` (tight!)
          - **This job overrides with:** `issues: write`
          - Without the override, the issue comment step would **fail** with a 403 error

          > 💡 Takeaway: always start with least privilege and add only what each job needs.
          EOF
